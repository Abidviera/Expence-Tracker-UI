<div class="CustomerCreation">
  <div class="container-fluid">
    <div class="form-card">
      <div class="form-header">
        <h2>{{ isEditMode ? 'Update' : 'Add' }} Tax</h2>
        <p>Enter the tax configuration below</p>
      </div>

      <div class="form-body">
        <div class="form-section">
          <div class="form-grid">
            <div class="form-group">
              <div class="label-icon-row">
                <label for="taxName" class="field-required">Tax Name</label>
                <i class="fas fa-percentage"></i>
              </div>
              <div class="form-input-wrapper">
                <input
                  type="text"
                  id="taxName"
                  placeholder="e.g. VAT, GST, Sales Tax, Service Tax"
                  maxlength="100"
                  [(ngModel)]="tax.name"
                />
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="taxPercentage" class="field-required">Tax Percentage</label>
                <i class="fas fa-chart-line"></i>
              </div>
              <div class="form-input-wrapper">
                <input
                  type="number"
                  id="taxPercentage"
                  placeholder="e.g. 15.00"
                  min="0"
                  max="100"
                  step="0.01"
                  [(ngModel)]="tax.percentage"
                />
                <span class="input-suffix">%</span>
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="isActive">Status</label>
                <i class="fas fa-toggle-on"></i>
              </div>
              <div class="form-input-wrapper">
                <select id="isActive" [(ngModel)]="tax.isActive" class="form-control">
                  <option [ngValue]="true">Active</option>
                  <option [ngValue]="false">Inactive</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="isEnabled">Enable for Calculations</label>
                <i class="fas fa-calculator"></i>
              </div>
              <div class="form-input-wrapper">
                <div class="toggle-wrapper">
                  <label class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="tax.isEnabled" />
                    <span class="toggle-slider"></span>
                  </label>
                  <span class="toggle-label">
                    {{ tax.isEnabled ? 'Tax will be included in calculations' : 'Tax will be excluded from calculations' }}
                  </span>
                </div>
              </div>
            </div>

            <div class="form-group full-width">
              <div class="label-icon-row">
                <label for="taxDescription">Description</label>
                <i class="fas fa-align-left"></i>
              </div>
              <div class="form-textarea-wrapper">
                <textarea
                  id="taxDescription"
                  placeholder="Enter a brief description for this tax..."
                  maxlength="250"
                  rows="3"
                  [(ngModel)]="tax.description"
                ></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn btn-view-list view-list" routerLink="/features/tax">
          <i class="fas fa-list"></i> View List
        </button>
        <button type="button" class="btn btn-secondary" (click)="resetForm()">
          <i class="fas fa-refresh"></i> Reset
        </button>
        <button type="submit" class="btn btn-primary" (click)="submitTax()" [disabled]="isLoading">
          {{ isEditMode ? 'Update' : 'Create' }} Tax
        </button>
      </div>
    </div>
  </div>
</div>

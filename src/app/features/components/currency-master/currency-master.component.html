<div class="CustomerCreation">
  <div class="container-fluid">
    <div class="form-card">
      <div class="form-header">
        <h2>{{ isEditMode ? 'Update' : 'Add' }} Currency</h2>
        <p>Enter the currency details below</p>
      </div>

      <div class="form-body">
        <div class="form-section">
          <div class="form-grid">
            <div class="form-group">
              <div class="label-icon-row">
                <label for="currencyName" class="field-required">Currency Name</label>
                <i class="fas fa-coins"></i>
              </div>
              <div class="form-input-wrapper">
                <input
                  type="text"
                  id="currencyName"
                  placeholder="e.g. US Dollar, Euro, British Pound"
                  maxlength="100"
                  [(ngModel)]="currency.name"
                />
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="currencyCode" class="field-required">Currency Code</label>
                <i class="fas fa-code"></i>
              </div>
              <div class="form-input-wrapper">
                <input
                  type="text"
                  id="currencyCode"
                  placeholder="e.g. USD, EUR, GBP"
                  maxlength="10"
                  [(ngModel)]="currency.code"
                  style="text-transform: uppercase"
                />
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="currencySymbol" class="field-required">Symbol</label>
                <i class="fas fa-font"></i>
              </div>
              <div class="form-input-wrapper">
                <input
                  type="text"
                  id="currencySymbol"
                  placeholder="e.g. $, &euro;, &pound;"
                  maxlength="5"
                  [(ngModel)]="currency.symbol"
                />
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="imageUrl">Image URL</label>
                <i class="fas fa-image"></i>
              </div>
              <div class="form-input-wrapper">
                <input
                  type="text"
                  id="imageUrl"
                  placeholder="e.g. /assets/flags/usd.png"
                  maxlength="500"
                  [(ngModel)]="currency.imageUrl"
                />
              </div>
              <div class="image-preview" *ngIf="previewImage()">
                <img [src]="previewImage()" alt="Currency image" class="currency-preview-img" />
              </div>
            </div>

            <div class="form-group full-width">
              <div class="label-icon-row">
                <label for="currencyDescription">Description</label>
                <i class="fas fa-align-left"></i>
              </div>
              <div class="form-textarea-wrapper">
                <textarea
                  id="currencyDescription"
                  placeholder="Enter a brief description for this currency..."
                  maxlength="250"
                  rows="3"
                  [(ngModel)]="currency.description"
                ></textarea>
              </div>
            </div>

            <div class="form-group">
              <div class="label-icon-row">
                <label for="isActive">Status</label>
                <i class="fas fa-toggle-on"></i>
              </div>
              <div class="form-input-wrapper">
                <select id="isActive" [(ngModel)]="currency.isActive" class="form-control">
                  <option [ngValue]="true">Active</option>
                  <option [ngValue]="false">Inactive</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn btn-view-list view-list" routerLink="/features/currency">
          <i class="fas fa-list"></i> View List
        </button>
        <button type="button" class="btn btn-secondary" (click)="resetForm()">
          <i class="fas fa-refresh"></i> Reset
        </button>
        <button type="submit" class="btn btn-primary" (click)="submitCurrency()" [disabled]="isLoading">
          {{ isEditMode ? 'Update' : 'Create' }} Currency
        </button>
      </div>
    </div>
  </div>
</div>
